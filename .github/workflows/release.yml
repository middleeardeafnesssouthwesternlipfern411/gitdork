name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install click rich httpx pytest build twine
          pip install -e .

      - name: Run tests (must pass before release)
        run: pytest tests/ -v --tb=short

      - name: Build PyPI package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Build release zip
        run: |
          TAG="${GITHUB_REF_NAME}"
          STAGING="gitdork-${TAG}"
          mkdir -p "${STAGING}"
          rsync -av \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.pytest_cache' \
            --exclude='*.egg-info' \
            --exclude="${STAGING}" \
            . "${STAGING}/"
          ZIP_NAME="gitdork-${TAG}.zip"
          zip -r "${ZIP_NAME}" "${STAGING}/"
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "--- Release zip contents ---"
          unzip -l "${ZIP_NAME}"

      - name: Extract changelog entry
        run: |
          python3 - << 'PYEOF'
          import re, os
          tag = os.environ["GITHUB_REF_NAME"]
          version = tag.lstrip("v")
          try:
              readme = open("CHANGELOG.md").read()
              pattern = rf"(?m)^##\s+\[?v?{re.escape(version)}\]?.*?\n(.*?)(?=\n^##\s|\Z)"
              m = re.search(pattern, readme, re.DOTALL)
              notes = m.group(1).strip() if m else f"Release {tag}"
          except Exception:
              notes = f"gitdork {tag}"
          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)
          print(notes[:500])
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "gitdork ${{ github.ref_name }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
